name: E2E AI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      MONGO_URI: ${{ secrets.MONGO_URI }}

    strategy:
      matrix:
        runs: [1, 3, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start services
        run: |
          docker compose up --build -d

      - name: Wait for python-ai to be ready
        run: |
          echo "Waiting for http://localhost:8000 to respond..."
          for i in {1..60}; do
            if curl -sS http://localhost:8000 >/dev/null 2>&1; then
              echo "python-ai is up"; break
            fi
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('python-ai/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python deps for runner
        run: |
          python -m pip install --upgrade pip
          if [ -f python-ai/requirements.txt ]; then pip install -r python-ai/requirements.txt; fi
          pip install requests

      - name: Run CI wrapper
        run: |
          python scripts/run_e2e_ai_ci.py --runs ${{ matrix.runs }} --outdir logs/e2e_ai_runs_${{ matrix.runs }}

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ai-logs-${{ matrix.runs }}
          path: logs/e2e_ai_runs_${{ matrix.runs }}

      - name: Tear down services
        if: always()
        run: |
          docker compose down -v
