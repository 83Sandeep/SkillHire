version: '3.8'
services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017/skillhire
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://python-ai:8000
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - python-ai

  client:
    build: ./Client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://host.docker.internal:5000
    depends_on:
      - server

  python-ai:
    build: ./python-ai
    ports:
      - "8000:8000"
